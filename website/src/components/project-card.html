<article id="{{cardId}}" class="content-card content-card--project">
  <img class="content-card__image" src="{{image}}" alt="{{imageAlt}}">
  <div class="content-card__content">
    <h3 class="content-card__title">{{title}}</h3>
    <p class="content-card__meta">{{period}}</p>
    <p class="content-card__body">{{summary}}</p>
  </div>
</article>
