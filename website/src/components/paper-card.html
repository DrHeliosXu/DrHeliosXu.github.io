<article id="{{cardId}}" class="content-card content-card--paper">
  <h3 class="content-card__title">{{title}}</h3>
  <p class="content-card__meta">{{journal}} · {{year}}</p>
  <p class="content-card__body">{{authors}}</p>
  <a class="content-card__link" href="{{doi}}" target="_blank" rel="noopener">{{linkLabel}}</a>
</article>
