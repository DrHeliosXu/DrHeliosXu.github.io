<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Periodic Travel</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,700" rel="stylesheet" />
    <link rel="stylesheet" href="https://public.codepenassets.com/css/reset-2.0.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="toolbar">
          <label class="language-switcher" for="language-select">
            <span>Language</span>
            <select id="language-select" aria-label="Choose language">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
            </select>
          </label>
        </div>
        <p class="eyebrow">Matrix Driven Layout</p>
        <h1 id="page-title">世界这么大，我想去看看</h1>
        <p id="page-subtitle" class="subtitle">The World is Round, I Wanna Wander Around</p>
      </header>

      <section class="board board-desktop">
        <div id="desktop-grid" class="periodic-grid" aria-label="Desktop matrix layout"></div>
        <div id="hover-panel" class="hover-panel" aria-live="polite"></div>
      </section>

      <section class="board board-mobile">
        <div id="mobile-grid" class="mobile-grid" aria-label="Mobile compact layout"></div>
      </section>

      <section class="legend-panel">
        <h2>Color System</h2>
        <div id="legend" class="legend"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
